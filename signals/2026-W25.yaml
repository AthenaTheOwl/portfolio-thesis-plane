# signals/2026-W25.yaml
#
# Hand-curated signals for the calibration week. v0 spec 0001 says
# the first week is computed by hand to anchor the rubric before any
# live-ingest automation lands (spec 0003).
#
# Per-repo shape:
#   <slug>:
#     scores:           # 0..4 per factor, all five required
#       model-release-impact: int
#       oss-competition: int
#       paper-drift: int
#       recent-run-evidence: int
#       decision-freshness: int
#     evidence:         # one or more short strings per factor
#       <factor>: [ "...", "..." ]
#
# Repos absent from this file score 0 on every factor for the week.

